name: Archive Hormuz History

on:
  schedule:
    - cron: '0 3 * * *'   # Daily at 03:00 UTC, after overnight snapshots accumulate
  workflow_dispatch:        # Also runnable manually from the Actions tab

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit data files back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Archive history data
        env:
          HORMUZ_PROXY_URL: https://hormuz-live-proxy.tallen5431.workers.dev
        run: python scripts/archive_history.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new snapshots to commit."
          else
            git commit -m "chore: archive Hormuz history $(date -u +%Y-%m-%d)"
            git push
          fi

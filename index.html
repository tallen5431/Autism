<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Bouncing Cube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="cube first-cube">
            <div class="face front"><img src="obama.png" alt="Obama"></div>
            <div class="face back"><img src="obama.png" alt="Obama"></div>
            <div class="face left"><img src="obama.png" alt="Obama"></div>
            <div class="face right"><img src="obama.png" alt="Obama"></div>
            <div class="face top"><img src="obama.png" alt="Obama"></div>
            <div class="face bottom"><img src="obama.png" alt="Obama"></div>
        </div>
        <div class="cube second-cube">
            <div class="face front"><img src="trump.jpg" alt="Trump"></div>
            <div class="face back"><img src="trump.jpg" alt="Trump"></div>
            <div class="face left"><img src="trump.jpg" alt="Trump"></div>
            <div class="face right"><img src="trump.jpg" alt="Trump"></div>
            <div class="face top"><img src="trump.jpg" alt="Trump"></div>
            <div class="face bottom"><img src="trump.jpg" alt="Trump"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
